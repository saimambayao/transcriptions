<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Concept Note: Shari'ah and Bangsamoro Governance</title>
    <style>
        @page {
            size: letter;
            margin: 1in 0.75in;
            @top-right {
                content: "Concept Note: Shari'ah Governance";
                font-family: 'Inter', sans-serif;
                font-size: 8pt;
                color: #666;
            }
            @bottom-left {
                content: none;
            }
            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-family: 'Inter', sans-serif;
                font-size: 8pt;
                color: #666;
            }
        }

        @page :first {
            margin-top: 0;
            @top-right { content: none; }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
        }

        /* Cover Page */
        .cover {
            height: 9.5in;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 8pt solid #1B4F72;
            page-break-after: always;
        }

        .cover-top-line {
            width: 100%;
            height: 4pt;
            background: #D4AF37;
            margin-bottom: 2in;
        }

        .cover h1 {
            font-size: 32pt;
            font-weight: 800;
            color: #1B4F72;
            margin-bottom: 0.2em;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }

        .cover h2 {
            font-size: 18pt;
            font-weight: 400;
            color: #555;
            margin-top: 0;
            margin-bottom: 2em;
        }

        .cover-meta {
            font-size: 10pt;
            color: #666;
            margin-top: auto;
            margin-bottom: 1in;
        }

        .cover-institutional-strip {
            display: flex;
            justify-content: center;
            gap: 24pt;
            margin-bottom: 0.5in;
        }

        .inst-logo {
            font-weight: 700;
            color: #1B4F72;
            font-size: 9pt;
            letter-spacing: 0.1em;
        }

        /* Content Styles */
        h1 {
            font-size: 24pt;
            color: #1B4F72;
            border-bottom: 2pt solid #D4AF37;
            padding-bottom: 10pt;
            margin-top: 1.5em;
            page-break-after: avoid;
        }

        h2 {
            font-size: 16pt;
            color: #1B4F72;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            page-break-after: avoid;
        }

        h3 {
            font-size: 13pt;
            color: #333;
            border-left: 3pt solid #D4AF37;
            padding-left: 10pt;
            margin-top: 1.2em;
        }

        p, ul, ol {
            margin-bottom: 1em;
        }

        li {
            margin-bottom: 0.5em;
        }

        strong {
            color: #1B4F72;
        }

        hr {
            border: none;
            border-top: 1pt solid #eee;
            margin: 2em 0;
        }

        /* Callouts / Highlights */
        .callout {
            background: #f8faff;
            border-left: 4pt solid #1B4F72;
            padding: 15pt 20pt;
            margin: 1.5em 0;
            font-style: italic;
        }

        .partnership-item {
            margin-bottom: 1.5em;
            padding: 10pt;
            background: #fcfcfc;
            border: 0.5pt solid #eee;
            border-radius: 4pt;
        }

        .partnership-title {
            font-weight: 700;
            color: #006400; /* Islamic Green */
            font-size: 11pt;
            display: block;
            margin-bottom: 4pt;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="cover-top-line"></div>

        <h1>Concept Note</h1>
        <h2>Shari'ah and Bangsamoro Governance Guidebook</h2>
        <div class="cover-meta">
            <p>March 31, 2026</p>
        </div>
    </div>

    <div class="content">
        {{CONTENT}}
    </div>
</body>
</html>
